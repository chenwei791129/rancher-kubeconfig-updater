name: PR Build

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            output: rancher-kubeconfig-updater-linux-amd64
          - goos: darwin
            goarch: arm64
            output: rancher-kubeconfig-updater-darwin-arm64
          - goos: windows
            goarch: amd64
            output: rancher-kubeconfig-updater-windows-amd64.exe
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false

      - name: Embed Windows resources (manifest + placeholder version info)
        if: matrix.goos == 'windows'
        run: |
          go tool goversioninfo -platform-specific versioninfo.json

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          go build -ldflags="-s -w -X main.version=pr-${{ github.event.pull_request.number || github.sha }}" -o ${{ matrix.output }} .

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.output }}
          path: ${{ matrix.output }}
          retention-days: 14
          if-no-files-found: error
