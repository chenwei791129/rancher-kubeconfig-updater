on:
  push:
    branches:
      - main

permissions:
  contents: write
  issues: write
  pull-requests: write

name: release-please

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          # 使用 PAT token（因為 main 分支有保護規則）
          token: ${{ secrets.MY_RELEASE_PLEASE_TOKEN }}
          release-type: go

  build-and-upload:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            output: rancher-kubeconfig-updater-linux-amd64
          - goos: darwin
            goarch: arm64
            output: rancher-kubeconfig-updater-darwin-arm64
          - goos: windows
            goarch: amd64
            output: rancher-kubeconfig-updater-windows-amd64.exe
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false

      - name: Embed Windows resources (manifest + version info)
        if: matrix.goos == 'windows'
        env:
          TAG_NAME: ${{ needs.release-please.outputs.tag_name }}
        run: |
          if [[ ! "$TAG_NAME" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            echo "::error::TAG_NAME=$TAG_NAME does not match vMAJOR.MINOR.PATCH; aborting goversioninfo step." >&2
            exit 1
          fi
          # vX.Y.Z -> X.Y.Z.0 — Windows version fields are 4-part. -propagate-ver-strings
          # parses these strings back into the FixedFileInfo numeric struct so both the
          # human-visible File Properties rows and the numeric resource fields agree.
          VERSION="${BASH_REMATCH[1]}.${BASH_REMATCH[2]}.${BASH_REMATCH[3]}.0"
          go tool goversioninfo \
            -platform-specific \
            -file-version="$VERSION" \
            -product-version="$VERSION" \
            -propagate-ver-strings \
            versioninfo.json

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          go build -ldflags="-s -w -X main.version=${{ needs.release-please.outputs.tag_name }}" -o ${{ matrix.output }} .

      - name: Upload Release Asset
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ needs.release-please.outputs.tag_name }} ${{ matrix.output }} --clobber
